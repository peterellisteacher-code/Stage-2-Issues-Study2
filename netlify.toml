# Netlify config — static frontend + Functions backend.
#
# The 2026-04 Vertex/Cloud Run architecture has been retired.
# /api/* now routes to Netlify Functions in netlify/functions/, which
# call Anthropic Haiku 4.5 directly. Set ANTHROPIC_API_KEY as an
# environment variable in Site Settings → Environment variables before
# the first deploy.

[build]
  publish = "."
  command = "echo 'no build step'"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Bundle the data/ directory and extracted_docx alongside the function so
  # they're accessible via fs.readFileSync at runtime.
  included_files = ["data/**", "extracted_docx/**"]

# /api/<name> → /.netlify/functions/<name>
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/feedback"
  to = "/.netlify/functions/feedback"
  status = 200
  force = true

# /readings/<file> → committed PDF in /readings/. The path resolves locally
# against the static publish root; Netlify serves it from the CDN once
# committed. (Files committed under readings/ inside the repo.)
# This block is intentionally a no-op redirect that lets us add headers below.
[[headers]]
  for = "/readings/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't let the browser cache the SPA shell or static data — they change
# more often than the PDFs.
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
