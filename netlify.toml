# Netlify config: static frontend + serverless functions calling
# Claude Haiku 4.5 (Anthropic API). Set ANTHROPIC_API_KEY in
# Site settings -> Environment variables (scope: Builds, Functions, Runtime).

[build]
  publish = "."
  command = "echo 'no build step'"
  functions = "netlify/functions"

# Bundle the static data JSONs alongside each function so the
# Lambda can read them via fs.readFileSync at runtime.
[functions]
  node_bundler = "esbuild"
  included_files = ["data/*.json"]

# /api/* -> serverless functions. The frontend calls /api/chat,
# /api/feedback; this rewrites them to /.netlify/functions/<name>.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Reading PDFs (the readings/ folder at the repo root) are served
# directly by Netlify's CDN as static assets. No redirect needed.

[[headers]]
  for = "/readings/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
