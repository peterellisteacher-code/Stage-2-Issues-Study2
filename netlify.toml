# Netlify config: static frontend + reverse proxy /api/* to Cloud Run.
#
# The Cloud Run URL is injected at deploy time as the env var BACKEND_URL.
# Set it on Netlify (Site settings -> Environment variables) before the
# first deploy, e.g. BACKEND_URL=https://issues-study-lab-xyz.run.app

[build]
  # The lab files are at the repo root after the deploy restructure.
  publish = "."
  command = "echo 'no build step'"

# Reverse-proxy /api/* to the Cloud Run backend.
# When this config is processed, BACKEND_URL must be set in Netlify env.
[[redirects]]
  from = "/api/*"
  to = "${BACKEND_URL}/api/:splat"
  status = 200
  force = true

# Cache headers for the static reading PDFs -- they don't change once cached.
[[headers]]
  for = "/readings/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"
