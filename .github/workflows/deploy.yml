name: Deploy to Cloud Run + Netlify

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "screenshots/**"
      - "test_transcripts/**"
      - "DEPLOY_REPORT.md"
  workflow_dispatch: {}   # manual trigger from the Actions tab

# Default permissions: minimum needed to commit DEPLOY_REPORT.md back.
permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: gen-lang-client-0274569601
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: issues-study-lab
  GCP_SERVICE_ACCOUNT: vertex-express@gen-lang-client-0274569601.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── GCP auth + Cloud Run ──────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Ensure Vertex AI User role on runtime SA (idempotent)
        run: |
          gcloud projects add-iam-policy-binding "$GCP_PROJECT_ID" \
            --member="serviceAccount:$GCP_SERVICE_ACCOUNT" \
            --role="roles/aiplatform.user" --quiet || true

      - name: Deploy to Cloud Run
        id: cloudrun
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --source . \
            --region "$GCP_REGION" \
            --service-account="$GCP_SERVICE_ACCOUNT" \
            --allow-unauthenticated \
            --memory 1Gi --cpu 1 --max-instances 10 --concurrency 8 --timeout 300 \
            --quiet
          URL="$(gcloud run services describe "$CLOUD_RUN_SERVICE" --region "$GCP_REGION" --format='value(status.url)')"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Cloud Run URL: $URL"

      - name: Smoke-test backend (/api/questions)
        run: |
          set -e
          URL="${{ steps.cloudrun.outputs.url }}"
          n="$(curl -sf "$URL/api/questions" | python3 -c 'import sys,json; print(len(json.load(sys.stdin)["questions"]))')"
          echo "questions: $n"
          test "$n" -ge 100

      # ── Netlify ───────────────────────────────────────────────────────
      - name: Install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: Resolve / create Netlify site
        id: netlify_site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          set -e
          # Prefer the site-id stored in the repo (.netlify_site_id), then the secret, else create a new site.
          SITE_ID=""
          if [ -f .netlify_site_id ]; then SITE_ID="$(cat .netlify_site_id)"; fi
          if [ -z "$SITE_ID" ]; then SITE_ID="${{ secrets.NETLIFY_SITE_ID }}"; fi
          if [ -z "$SITE_ID" ]; then
            echo "Creating new Netlify site …"
            # Random suffix avoids global-name collisions
            SUFFIX=$(date +%s | tail -c 5)
            SITE_NAME="peter-issues-study-lab-${SUFFIX}"
            netlify sites:create --name "$SITE_NAME" --json > /tmp/site.json
            SITE_ID="$(jq -r .id /tmp/site.json)"
            echo "$SITE_ID" > .netlify_site_id
            echo "Created Netlify site: $SITE_NAME ($SITE_ID)"
          else
            echo "Using existing Netlify site: $SITE_ID"
          fi
          SITE_URL="$(netlify api getSite --data "{\"site_id\":\"$SITE_ID\"}" | jq -r .ssl_url)"
          echo "site_id=$SITE_ID" >> "$GITHUB_OUTPUT"
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"

      - name: Set BACKEND_URL on Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          netlify env:set BACKEND_URL "${{ steps.cloudrun.outputs.url }}" \
            --site "${{ steps.netlify_site.outputs.site_id }}" \
            --context production

      - name: Deploy to Netlify (production)
        id: netlify_deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          netlify deploy --prod --dir . \
            --site "${{ steps.netlify_site.outputs.site_id }}" \
            --json > /tmp/deploy.json
          DEPLOY_URL="$(jq -r '.deploy_url // .url' /tmp/deploy.json)"
          PROD_URL="$(jq -r '.url' /tmp/deploy.json)"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "prod_url=$PROD_URL"   >> "$GITHUB_OUTPUT"
          echo "Netlify URL: $PROD_URL"

      # ── Wire CORS so Netlify -> Cloud Run actually works ─────────────
      - name: Update Cloud Run CORS_ORIGINS
        run: |
          gcloud run services update "$CLOUD_RUN_SERVICE" \
            --region "$GCP_REGION" \
            --update-env-vars "CORS_ORIGINS=${{ steps.netlify_deploy.outputs.prod_url }}" \
            --quiet

      # ── End-to-end smoke test from the URL students will use ─────────
      - name: Smoke-test through Netlify
        run: |
          set -e
          URL="${{ steps.netlify_deploy.outputs.prod_url }}"
          # /api proxy must work
          n="$(curl -sf "$URL/api/questions" | python3 -c 'import sys,json; print(len(json.load(sys.stdin)["questions"]))')"
          echo "via netlify: $n questions"
          test "$n" -ge 100
          # /readings/* must serve from Netlify CDN, not 404
          first_pdf="$(ls readings | head -1)"
          if [ -n "$first_pdf" ]; then
            curl -sIf "$URL/readings/$first_pdf" | head -1
          fi

      # ── Report + commit back ─────────────────────────────────────────
      - name: Write DEPLOY_REPORT.md
        run: |
          cat > DEPLOY_REPORT.md <<EOF
          # Deploy Report

          Last deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          | Layer | URL |
          |---|---|
          | **Live site (give to students)** | ${{ steps.netlify_deploy.outputs.prod_url }} |
          | Backend (Cloud Run) | ${{ steps.cloudrun.outputs.url }} |
          | GitHub repo | ${{ github.server_url }}/${{ github.repository }} |
          | Netlify site ID | \`${{ steps.netlify_site.outputs.site_id }}\` |

          ## Pipeline

          - Push to \`main\` → Cloud Run deploy via Cloud Build → Netlify deploy via CLI.
          - Cloud Run runs the Flask broker; Netlify serves the SPA + 137 reading PDFs.
          - Netlify's \`/api/*\` redirect is rewritten to the Cloud Run URL via \`netlify.toml\`.
          - CORS on Cloud Run is restricted to the Netlify production URL.

          ## Costs

          - Cloud Build: ~\$0.05 per deploy.
          - Cloud Run: scales to zero. Per chat: ~\$0.05; per feedback: ~\$0.03.
          - Netlify: free tier (100 GB bandwidth/month).
          - Vertex caches: ~\$0.39/day across 14 cluster caches (70-day TTL).

          ## Triggering a redeploy

          - Push to \`main\` (auto)
          - Or run the workflow manually: Actions tab → "Deploy to Cloud Run + Netlify" → Run workflow.
          EOF

      - name: Commit DEPLOY_REPORT and netlify_site_id
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DEPLOY_REPORT.md .netlify_site_id
          git commit -m "Deploy: update DEPLOY_REPORT" || echo "no changes to commit"
          git push
